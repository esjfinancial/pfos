<!DOCTYPE html>
<html lang="en" style="background:#09092E;margin:0;padding:0">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PFOS — System Health Check</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#09092E;--bg-card:#0E0E38;--bl:#0044BF;--bll:#5B9BFF;--or:#F97316;--gr:#22C55E;--rd:#EF4444;--yl:#EAB308;--pu:#A855F7;--wh:#F0F6FF;--mu:#64748B;--bd:rgba(0,68,191,.18);--fh:'Rajdhani',sans-serif;--fb:'Outfit',sans-serif;--fd:'Bebas Neue',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--fb);font-size:15px;line-height:1.5;color:#E2E8F0;background:#09092E;min-height:100vh;padding:20px}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border:1px solid var(--bd);background:rgba(14,14,56,.9);border-radius:2px;margin-bottom:20px}
.hdr-title{font-family:var(--fh);font-size:18px;font-weight:800;color:var(--wh);letter-spacing:.04em}
.hdr-sub{font-family:var(--fh);font-size:10px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:#5B9BFF}
.hdr-right{display:flex;align-items:center;gap:10px}
.banner{padding:16px 20px;border-radius:2px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.banner.pass{background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.25)}
.banner.fail{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25)}
.banner.running{background:rgba(91,155,255,.08);border:1px solid rgba(91,155,255,.25)}
.banner-status{font-family:var(--fd);font-size:28px}
.banner-detail{font-size:12px;color:var(--mu)}
.section{margin-bottom:20px}
.section-title{font-family:var(--fh);font-size:11px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:#5B9BFF;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.section-title::before{content:'';width:14px;height:2px;background:linear-gradient(90deg,var(--or),var(--bl))}
.test-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-bottom:1px solid rgba(0,68,191,.06);font-size:13px}
.test-row:last-child{border-bottom:none}
.test-icon{width:22px;text-align:center;font-size:14px;flex-shrink:0}
.test-name{flex:1;color:rgba(226,232,240,.8)}
.test-status{font-family:var(--fh);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:2px;flex-shrink:0}
.test-status.pass{color:var(--gr);background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.2)}
.test-status.fail{color:var(--rd);background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2)}
.test-status.skip{color:var(--mu);background:rgba(100,116,139,.1);border:1px solid rgba(100,116,139,.2)}
.test-status.running{color:var(--yl);background:rgba(234,179,8,.1);border:1px solid rgba(234,179,8,.2)}
.test-time{font-family:var(--fh);font-size:10px;font-weight:700;color:var(--mu);width:50px;text-align:right;flex-shrink:0}
.card{background:var(--bg-card);border:1px solid var(--bd);border-radius:2px;padding:14px;margin-bottom:14px}
.btn{padding:9px 18px;font-family:var(--fh);font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;border-radius:2px;border:none;min-height:36px}
.btn-bl{background:rgba(0,68,191,.15);border:1px solid rgba(0,68,191,.3);color:#5B9BFF}
.btn-bl:hover{background:rgba(0,68,191,.25)}
.btn-or{background:rgba(249,115,22,.1);border:1px solid rgba(249,115,22,.25);color:var(--or)}
.timestamp{font-family:var(--fh);font-size:10px;font-weight:700;color:var(--mu);letter-spacing:.08em}
a{color:#5B9BFF;text-decoration:none}
a:hover{text-decoration:underline}
</style>
</head>
<body>

<div class="hdr">
  <div>
    <div class="hdr-title">PFOS System Health Check</div>
    <div class="hdr-sub">Automated Diagnostics</div>
  </div>
  <div class="hdr-right">
    <span class="timestamp" id="lastCheck">—</span>
    <button class="btn btn-bl" onclick="runAllTests()">⟳ Re-Run</button>
    <a href="https://pfos.esjfinancial.com/pfos-dashboard" class="btn btn-or" style="text-decoration:none;display:inline-flex;align-items:center">← Dashboard</a>
  </div>
</div>

<div id="summaryBanner" class="banner running">
  <div>
    <div class="banner-status" id="bannerStatus" style="color:var(--yl)">Running...</div>
    <div class="banner-detail" id="bannerDetail">Initializing health checks</div>
  </div>
  <div id="bannerCounts" style="display:flex;gap:14px"></div>
</div>

<div class="section">
  <div class="section-title">Infrastructure</div>
  <div class="card" id="infraTests"></div>
</div>

<div class="section">
  <div class="section-title">Core Tables (required)</div>
  <div class="card" id="coreTableTests"></div>
</div>

<div class="section">
  <div class="section-title">Feature Tables</div>
  <div class="card" id="featureTableTests"></div>
</div>

<div class="section">
  <div class="section-title">Page Routing</div>
  <div class="card" id="routeTests"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
var SUPABASE_URL='https://wbndgvicmgeodararpmr.supabase.co';
var SUPABASE_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndibmRndmljbWdlb2RhcmFycG1yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2NTIwNzYsImV4cCI6MjA5MDIyODA3Nn0.OwzfA3naIbJZFPmCZo87NkKRanXdJXlYOvWsx1GGwPE';

var db;
var results={pass:0,fail:0,skip:0,total:0};

// ── TEST RUNNER ──────────────────────────────────────
async function runTest(name, fn){
  var start=performance.now();
  try{
    var ok=await fn();
    var ms=Math.round(performance.now()-start);
    return {name:name,status:ok?'pass':'fail',ms:ms};
  }catch(e){
    var ms2=Math.round(performance.now()-start);
    return {name:name,status:'fail',ms:ms2,error:e.message};
  }
}

function renderTests(elId, testResults){
  var el=document.getElementById(elId);
  if(!el) return;
  el.innerHTML=testResults.map(function(t){
    var icon=t.status==='pass'?'✅':t.status==='fail'?'❌':'⏭️';
    return '<div class="test-row">'
      +'<div class="test-icon">'+icon+'</div>'
      +'<div class="test-name">'+t.name+(t.error?' <span style="color:var(--rd);font-size:11px">('+escH(t.error)+')</span>':'')+'</div>'
      +'<div class="test-status '+t.status+'">'+t.status+'</div>'
      +'<div class="test-time">'+t.ms+'ms</div>'
    +'</div>';
  }).join('');
}

function updateBanner(){
  var banner=document.getElementById('summaryBanner');
  var status=document.getElementById('bannerStatus');
  var detail=document.getElementById('bannerDetail');
  var counts=document.getElementById('bannerCounts');
  var allPass=results.fail===0;
  banner.className='banner '+(allPass?'pass':'fail');
  status.style.color=allPass?'var(--gr)':'var(--rd)';
  status.textContent=allPass?'All Systems Operational':'Issues Detected';
  detail.textContent=results.pass+' passed, '+results.fail+' failed, '+results.skip+' skipped out of '+results.total+' tests';
  counts.innerHTML='<span style="font-family:var(--fd);font-size:22px;color:var(--gr)">'+results.pass+'</span>'
    +'<span style="font-family:var(--fd);font-size:22px;color:var(--rd)">'+results.fail+'</span>'
    +'<span style="font-family:var(--fd);font-size:22px;color:var(--mu)">'+results.skip+'</span>';
  document.getElementById('lastCheck').textContent='Last check: '+new Date().toLocaleString();
}

function escH(s){ return String(s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── TABLE TEST HELPER ────────────────────────────────
function testTable(tableName){
  return async function(){
    var {data,error}=await db.from(tableName).select('id').limit(1);
    if(error) throw new Error(error.message);
    return true;
  };
}

// ── RUN ALL TESTS ────────────────────────────────────
async function runAllTests(){
  results={pass:0,fail:0,skip:0,total:0};
  document.getElementById('summaryBanner').className='banner running';
  document.getElementById('bannerStatus').textContent='Running...';
  document.getElementById('bannerStatus').style.color='var(--yl)';
  document.getElementById('bannerDetail').textContent='Testing infrastructure, tables, and routes...';

  // 1. Infrastructure tests
  var infraResults=[];

  // Supabase connection
  infraResults.push(await runTest('Supabase Connection', async function(){
    db=supabase.createClient(SUPABASE_URL,SUPABASE_ANON);
    if(!db) throw new Error('Client creation failed');
    return true;
  }));

  // Auth service
  infraResults.push(await runTest('Auth Service', async function(){
    var {data,error}=await db.auth.getSession();
    if(error) throw error;
    return true; // getSession works even if no active session
  }));

  // Internet connectivity
  infraResults.push(await runTest('Internet Connectivity', async function(){
    return navigator.onLine;
  }));

  // Supabase REST API
  infraResults.push(await runTest('Supabase REST API', async function(){
    var {error}=await db.from('users').select('id').limit(1);
    // RLS may block, but no connection error means API is up
    if(error&&error.message.indexOf('fetch')>=0) throw error;
    return true;
  }));

  renderTests('infraTests', infraResults);

  // 2. Core tables (required for basic operation)
  var coreTables=['users','clients','client_profiles','client_snapshots','reports','advisor_recommendations','messages','client_notifications','couple_links','shared_goals'];
  var coreResults=[];
  for(var i=0;i<coreTables.length;i++){
    coreResults.push(await runTest(coreTables[i], testTable(coreTables[i])));
  }
  renderTests('coreTableTests', coreResults);

  // 3. Feature tables
  var featureTables=['agent_profiles','agent_requests','audit_log','deletion_requests','unlink_requests','implementation_log','session_notes','follow_up_reminders','demo_requests','platform_feedback'];
  var featureResults=[];
  for(var j=0;j<featureTables.length;j++){
    featureResults.push(await runTest(featureTables[j], testTable(featureTables[j])));
  }
  renderTests('featureTableTests', featureResults);

  // 4. Page routing tests
  var pages=[
    {name:'Landing Page',path:'/'},
    {name:'Login',path:'/pfos/'},
    {name:'Dashboard',path:'/pfos-dashboard/'},
    {name:'Admin',path:'/pfos-admin/'},
    {name:'Client Portal',path:'/pfos-client/'},
    {name:'Client Profile',path:'/pfos-client-profile/'},
    {name:'PFOS Main Tool',path:'/pfos-main/'},
    {name:'Health Check',path:'/pfos-health/'}
  ];
  var routeResults=[];
  for(var k=0;k<pages.length;k++){
    var pg=pages[k];
    routeResults.push(await runTest(pg.name+' ('+pg.path+')', (function(path){
      return async function(){
        try{
          var resp=await fetch('https://pfos.esjfinancial.com'+path,{method:'HEAD',mode:'no-cors'});
          return true; // no-cors always returns opaque, but no throw = reachable
        }catch(e){
          throw new Error('Unreachable');
        }
      };
    })(pg.path)));
  }
  renderTests('routeTests', routeResults);

  // Tally results
  var allResults=infraResults.concat(coreResults,featureResults,routeResults);
  allResults.forEach(function(r){
    results.total++;
    if(r.status==='pass') results.pass++;
    else if(r.status==='fail') results.fail++;
    else results.skip++;
  });

  updateBanner();
}

// Auto-run on load
window.addEventListener('load', function(){ setTimeout(runAllTests, 300); });
</script>
</body>
</html>
